  <text x="1190" y="406" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">데이터 입력</text>
  <text x="1100" y="428" font-size="11" font-weight="500" fill="#0F172A">• 현재값 (숫자)</text>
  <text x="1100" y="444" font-size="11" font-weight="500" fill="#0F172A">• 현재값 상세 (메모)</text>
  <text x="1100" y="460" font-size="11" font-weight="500" fill="#0F172A">• 진척도 자동 계산</text>
  <text x="1100" y="476" font-size="11" font-weight="500" fill="#0F172A">• 신뢰도 (상/중/하)</text>

  <line x1="1300" y1="428" x2="1350" y2="428" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" />

  <!-- 단계 6: 저장 -->
  <rect x="1350" y="400" width="170" height="56" rx="10" fill="#B4E600" stroke="#84CC16" stroke-width="2" />
  <text x="1435" y="425" font-size="13" font-weight="800" fill="#0F172A" text-anchor="middle">[ 저장 ]</text>
  <text x="1435" y="441" font-size="11" font-weight="600" fill="#365314" text-anchor="middle">Upstash에 즉시 반영</text>

  <!-- 화살표 아래로 (피드백 루프) -->
  <line x1="1435" y1="456" x2="1435" y2="500" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" />

  <!-- 갱신 결과 -->
  <rect x="1280" y="500" width="240" height="50" rx="10" fill="#ECFCCB" stroke="#84CC16" stroke-width="1.5" />
  <text x="1400" y="522" font-size="12" font-weight="700" fill="#365314" text-anchor="middle">Hero·점수표 즉시 갱신</text>
  <text x="1400" y="538" font-size="10" font-weight="500" fill="#365314" text-anchor="middle">갱신일 자동 기록 · 토스트 표시</text>

  <!-- 다이아몬드: 다른 KR 남음? -->
  <polygon points="1170,525 1260,500 1170,475 1080,500" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" />
  <text x="1170" y="497" font-size="11" font-weight="700" fill="#92400E" text-anchor="middle">다른 KR</text>
  <text x="1170" y="511" font-size="11" font-weight="700" fill="#92400E" text-anchor="middle">남음?</text>

  <line x1="1280" y1="525" x2="1260" y2="525" stroke="#64748B" stroke-width="1.5" />

