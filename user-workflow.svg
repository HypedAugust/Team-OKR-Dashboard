<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif">
  <!-- defs -->
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748B" />
    </marker>
    <marker id="arrow-lime" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7AAA00" />
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- background -->
  <rect width="1600" height="1080" fill="#FAFAFA" />

  <!-- 제목 -->
  <text x="60" y="56" font-size="28" font-weight="800" fill="#0F172A">사용자 워크플로우 — OKR 대시보드</text>
  <text x="60" y="84" font-size="14" font-weight="500" fill="#64748B">team-okr-dashboard.vercel.app</text>

  <!-- ════════════════════════════════════════════
       LANE 1 · 상사 (조회 + 보고)
       ════════════════════════════════════════════ -->
  <rect x="40" y="120" width="1520" height="180" rx="16" fill="#FFFFFF" stroke="#E5E7EB" />
  <rect x="40" y="120" width="180" height="180" rx="16" fill="#EFF6FF" stroke="#E5E7EB" />
  <text x="60" y="170" font-size="13" font-weight="700" fill="#3B82F6" letter-spacing="1">LANE 01</text>
  <text x="60" y="200" font-size="22" font-weight="800" fill="#0F172A">상사</text>
  <text x="60" y="226" font-size="14" font-weight="500" fill="#64748B">조회 · 보고 수신</text>
  <text x="60" y="262" font-size="12" font-weight="500" fill="#94A3B8">주 1~2회</text>

  <!-- 단계 1: URL 접속 -->
  <rect x="260" y="180" width="160" height="60" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="340" y="208" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">URL 접속</text>
  <text x="340" y="226" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">슬랙 링크 등</text>

  <!-- 화살표 -->
  <line x1="420" y1="210" x2="470" y2="210" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 단계 2: Hero 요약 -->
  <rect x="470" y="180" width="180" height="60" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="560" y="205" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">Hero 4카드 확인</text>
  <text x="560" y="222" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">진척도·달성·신뢰도</text>
  <text x="560" y="235" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">3초 내 인지</text>

  <line x1="650" y1="210" x2="700" y2="210" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 다이아몬드: 위험 KR 있나? -->
  <polygon points="780,160 880,210 780,260 680,210" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5" />
  <text x="780" y="206" font-size="12" font-weight="700" fill="#92400E" text-anchor="middle">분기 종합 상태</text>
  <text x="780" y="222" font-size="11" font-weight="500" fill="#92400E" text-anchor="middle">배너 확인</text>

  <!-- 분기: 위험 -->
  <line x1="780" y1="260" x2="780" y2="290" stroke="#FF5A4A" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="795" y="282" font-size="11" font-weight="700" fill="#FF5A4A">위기</text>

  <rect x="690" y="290" width="180" height="34" rx="8" fill="#FEE2E2" stroke="#FF5A4A" stroke-width="1.5" />
  <text x="780" y="312" font-size="12" font-weight="700" fill="#7F1D1D" text-anchor="middle">위험 KR 스크롤 확인</text>

  <!-- 분기: 정상 -->
  <line x1="880" y1="210" x2="930" y2="210" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" />

  <rect x="930" y="180" width="160" height="60" rx="10" fill="#ECFCCB" stroke="#84CC16" stroke-width="1.5" />
  <text x="1010" y="208" font-size="13" font-weight="700" fill="#365314" text-anchor="middle">분기 순항 인지</text>
  <text x="1010" y="226" font-size="11" font-weight="500" fill="#365314" text-anchor="middle">상세 탐독 불필요</text>

  <line x1="1090" y1="210" x2="1140" y2="210" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- 단계 4: PDF 다운로드 -->
  <rect x="1140" y="180" width="170" height="60" rx="10" fill="#0F172A" stroke="#0F172A" />
  <text x="1225" y="207" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">📄 PDF 다운로드</text>
  <text x="1225" y="224" font-size="11" font-weight="500" fill="#CBD5E1" text-anchor="middle">3페이지 보고서</text>

  <line x1="1310" y1="210" x2="1360" y2="210" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="1360" y="180" width="170" height="60" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="1445" y="208" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">상부 보고</text>
  <text x="1445" y="226" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">메일·인쇄</text>

  <!-- ════════════════════════════════════════════
       LANE 2 · 편집자 (매주 금요일 갱신)
       ════════════════════════════════════════════ -->
