  <path d="M 1080,500 L 950,500 L 950,470 L 870,470" fill="none" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" stroke-dasharray="4 3" />
  <text x="990" y="492" font-size="11" font-weight="700" fill="#7AAA00">Yes → 3번으로</text>

  <!-- N: 종료 -->
  <line x1="1170" y1="475" x2="1170" y2="445" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="1180" y="465" font-size="11" font-weight="700" fill="#64748B">No</text>

  <rect x="1085" y="555" width="170" height="46" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="1170" y="582" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">이번 주 갱신 완료</text>
  <line x1="1170" y1="555" x2="1170" y2="540" stroke="#64748B" stroke-width="1.5" />

