  <rect x="40" y="340" width="180" height="280" rx="16" fill="#F7FEE7" stroke="#E5E7EB" />
  <text x="60" y="388" font-size="13" font-weight="700" fill="#7AAA00" letter-spacing="1">LANE 02</text>
  <text x="60" y="418" font-size="22" font-weight="800" fill="#0F172A">편집자</text>
  <text x="60" y="444" font-size="14" font-weight="500" fill="#64748B">매주 금요일 갱신</text>
  <text x="60" y="478" font-size="12" font-weight="500" fill="#94A3B8">@Benjamin @Ria</text>
  <text x="60" y="494" font-size="12" font-weight="500" fill="#94A3B8">@Que @Monica</text>
  <text x="60" y="528" font-size="11" font-weight="600" fill="#84CC16">3분 내 완료 목표</text>

  <!-- 단계 1 -->
  <rect x="260" y="400" width="150" height="56" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="335" y="425" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">매주 금요일</text>
  <text x="335" y="441" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">URL 접속</text>

  <line x1="410" y1="428" x2="450" y2="428" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" />

  <!-- 단계 2: 갱신율 확인 -->
  <rect x="450" y="400" width="170" height="56" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="535" y="425" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">"갱신 N/M" 확인</text>
  <text x="535" y="441" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">본인 미갱신 인지</text>

  <line x1="620" y1="428" x2="660" y2="428" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" />

  <!-- 단계 3: 본인 KR 찾기 -->
  <rect x="660" y="400" width="170" height="56" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="745" y="425" font-size="13" font-weight="700" fill="#0F172A" text-anchor="middle">본인 KR 카드 찾기</text>
  <text x="745" y="441" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">Owner 칩 스캔</text>

  <line x1="830" y1="428" x2="870" y2="428" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" />

