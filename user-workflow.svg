  <text x="560" y="868" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">즉시 반영</text>

  <line x1="650" y1="854" x2="690" y2="854" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="690" y="830" width="220" height="48" rx="8" fill="#ECFCCB" stroke="#84CC16" stroke-width="1.5" />
  <text x="800" y="854" font-size="12" font-weight="700" fill="#365314" text-anchor="middle">KR Owner 드롭다운 갱신</text>
