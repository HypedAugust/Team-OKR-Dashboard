  <text x="805" y="978" font-size="10" font-weight="500" fill="#CBD5E1" text-anchor="middle">3페이지 보고서</text>

  <line x1="890" y1="964" x2="930" y2="964" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

