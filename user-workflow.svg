  <text x="950" y="758" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">셀렉터에서 읽기 전용</text>

  <line x1="1050" y1="744" x2="1090" y2="744" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="1090" y="720" width="180" height="48" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
  <text x="1180" y="744" font-size="12" font-weight="700" fill="#0F172A" text-anchor="middle">Objective·KR 입력</text>
  <text x="1180" y="758" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">"+ Objective 추가"</text>

  <!-- ─── 3-B: 멤버 관리 (분기 중 언제든) ─── -->
  <text x="260" y="810" font-size="13" font-weight="800" fill="#475569">B. 멤버 관리 (입사·퇴사 시)</text>
  <line x1="260" y1="818" x2="1520" y2="818" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3 3" />

  <rect x="260" y="830" width="170" height="48" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
