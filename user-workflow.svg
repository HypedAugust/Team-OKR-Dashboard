  <rect x="660" y="720" width="150" height="48" rx="8" fill="#B4E600" stroke="#84CC16" stroke-width="1.5" />
  <text x="735" y="749" font-size="12" font-weight="800" fill="#0F172A" text-anchor="middle">[ 생성 ]</text>

  <line x1="810" y1="744" x2="850" y2="744" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="850" y="720" width="200" height="48" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 2" />
