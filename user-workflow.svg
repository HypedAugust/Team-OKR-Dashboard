  <line x1="430" y1="854" x2="470" y2="854" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="470" y="830" width="180" height="48" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" />
