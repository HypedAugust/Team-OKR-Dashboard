  <text x="580" y="978" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">Keep · Problem · Try</text>

  <line x1="680" y1="964" x2="720" y2="964" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)" />

  <rect x="720" y="940" width="170" height="48" rx="8" fill="#0F172A" stroke="#0F172A" />
