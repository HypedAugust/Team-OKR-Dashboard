  <text x="955" y="441" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">인라인 폼 진입</text>

  <line x1="1040" y1="428" x2="1080" y2="428" stroke="#7AAA00" stroke-width="1.5" marker-end="url(#arrow-lime)" />

  <!-- 단계 5: 입력 -->
